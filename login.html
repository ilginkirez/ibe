<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Giriş Yap - SeninBiletin</title>
  <link rel="stylesheet" href="style.css" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
</head>
<body class="auth-page">

  <!-- Arka Plan -->
  <div class="auth-bg" aria-hidden="true">
    <img src="gorseller/hero.png" alt="" class="auth-bg__image">
    <div class="auth-bg__overlay"></div>
  </div>

  <main class="auth-container">
    <!-- Geri Dön Butonu -->
    <a href="index.html" class="auth-back" aria-label="Ana sayfaya dön">
      <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <line x1="19" y1="12" x2="5" y2="12"></line>
        <polyline points="12 19 5 12 12 5"></polyline>
      </svg>
      Ana Sayfa
    </a>

    <!-- Giriş Kartı -->
    <div class="auth-card auth-card--split">
      <!-- Sol Taraf: Poster Görseli -->
      <div class="auth-card__poster">
        <img src="Assests/pexels-luan-kawee-475039735-16844549.jpg" alt="Konser Afişi" class="poster-image">
        <div class="poster-overlay">
          <h2>SeninBiletin ile Unutulmaz Anları Keşfet</h2>
        </div>
      </div>

      <!-- Sağ Taraf: Giriş Formu -->
      <div class="auth-card__content">
        <div class="auth-card__header">
          <div class="header__logo navbar__logo">
            <span class="navbar__logo-icon" aria-hidden="true">S</span>
            SeninBiletin
          </div>
          <h1 class="auth-card__title">Hoş Geldiniz</h1>
          <p class="auth-card__subtitle">Eğlence dünyasına kaldığınız yerden devam edin.</p>
        </div>

        <form class="auth-form" action="#" method="POST">
          
          <!-- Floating Label Input: Email -->
          <div class="form-group floating-label">
            <input type="email" id="email" class="form-control" placeholder=" " required />
            <label for="email">E-posta Adresi</label>
          </div>

          <!-- Floating Label Input: Password -->
          <div class="form-group floating-label">
            <input type="password" id="password" class="form-control" placeholder=" " required />
            <label for="password">Şifre</label>
          </div>

          <div class="auth-form__actions">
            <label class="checkbox-container">
              <input type="checkbox" name="remember" />
              <span class="checkmark"></span>
              Beni Hatırla
            </label>
            <a href="#" class="forgot-password">Şifremi Unuttum</a>
          </div>

          <button type="submit" class="btn btn-primary auth-submit">Giriş Yap</button>
        </form>

        <div class="auth-divider">
          <span>veya şununla devam et</span>
        </div>

        <div class="auth-social">
          <button class="btn-social">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor">
              <path d="M12.545,10.239v3.821h5.445c-0.712,2.315-2.647,3.972-5.445,3.972c-3.332,0-6.033-2.701-6.033-6.032 s2.701-6.032,6.033-6.032c1.498,0,2.866,0.549,3.921,1.453l2.814-2.814C17.503,2.988,15.139,2,12.545,2 C7.021,2,2.543,6.477,2.543,12s4.478,10,10.002,10c8.396,0,10.249-7.85,9.426-11.761H12.545z"/>
            </svg>
            Google
          </button>
          <button class="btn-social">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor">
              <path d="M17.05 20.28c-.98.95-2.05.8-3.08.35-1.09-.46-2.09-.48-3.24 0-1.44.62-2.2.44-3.06-.35C2.79 15.25 3.51 7.59 9.05 7.31c1.35.07 2.29.74 3.08.8 1.18-.09 2.31-.86 3.65-.74 1.25.13 2.53.86 3.29 2 0 0-3.33 1.93-3.25 5.25.07 3.02 2.76 4.14 2.76 4.14-.23.6-.66 1.35-1.53 1.52zM12.03 7.25c-.15-2.23 1.66-4.07 3.74-4.25.29 2.58-2.34 4.5-3.74 4.25z"/>
            </svg>
            Apple
          </button>
        </div>

        <p class="auth-footer-text">
          Hesabınız yok mu? <a href="register.html">Kayıt Ol</a>
        </p>
      </div>
    </div>
  </main>

</body>
</html>
